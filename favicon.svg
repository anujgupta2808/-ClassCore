<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Indigo circle background -->
  <circle cx="32" cy="32" r="31" fill="#4f46e5"/>

  <!-- Mortarboard top (diamond) -->
  <polygon points="32,10 50,22 32,28 14,22" fill="white"/>

  <!-- Cap brim shadow -->
  <ellipse cx="32" cy="22" rx="18" ry="4" fill="rgba(0,0,0,0.15)"/>

  <!-- Graduation gown collar / base -->
  <rect x="20" y="34" width="24" height="14" rx="4" fill="white" opacity="0.9"/>

  <!-- Tassel string -->
  <line x1="50" y1="22" x2="50" y2="40" stroke="#facc15" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tassel ball -->
  <circle cx="50" cy="44" r="4" fill="#facc15"/>

  <!-- Tassel fringe lines -->
  <line x1="47" y1="40" x2="45" y2="47" stroke="#facc15" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="41" x2="50" y2="48" stroke="#facc15" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="53" y1="40" x2="55" y2="47" stroke="#facc15" stroke-width="1.5" stroke-linecap="round"/>
</svg>
