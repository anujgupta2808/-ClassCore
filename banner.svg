<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 600" width="420" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="50%"  stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%">
      <stop offset="0%"   stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.5"/></filter>
    <filter id="glow-text"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a5b4fc" flood-opacity="0.8"/></filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="600" fill="url(#bg)"/>

  <!-- Animated orb 1 -->
  <ellipse cx="60" cy="80" rx="160" ry="160" fill="url(#orb1)" filter="url(#blur1)" opacity="0.7">
    <animate attributeName="cx" values="60;100;60" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;120;80" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="9s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Animated orb 2 -->
  <ellipse cx="380" cy="500" rx="130" ry="130" fill="url(#orb2)" filter="url(#blur1)" opacity="0.6">
    <animate attributeName="cx" values="380;340;380" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="500;460;500" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Animated orb 3 -->
  <ellipse cx="220" cy="320" rx="100" ry="100" fill="url(#orb3)" filter="url(#blur2)" opacity="0.4">
    <animate attributeName="cx" values="220;260;220" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="320;280;320" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Floating particles -->
  <circle cx="80"  cy="200" r="2" fill="#6366f1" opacity="0.6">
    <animate attributeName="cy" values="200;180;200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="150" r="1.5" fill="#a5b4fc" opacity="0.5">
    <animate attributeName="cy" values="150;130;150" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="450" r="2" fill="#10b981" opacity="0.4">
    <animate attributeName="cy" values="450;430;450" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="400" r="1.5" fill="#f59e0b" opacity="0.4">
    <animate attributeName="cy" values="400;380;400" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50"  cy="380" r="1" fill="#a5b4fc" opacity="0.3">
    <animate attributeName="cy" values="380;360;380" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="390" cy="280" r="1.5" fill="#6366f1" opacity="0.4">
    <animate attributeName="cy" values="280;260;280" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Graduation cap group — floats up and down -->
  <g filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-12; 0,0" dur="3s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>

    <!-- Cap board (diamond) -->
    <polygon points="210,148 270,178 210,198 150,178" fill="white" opacity="0.95"/>

    <!-- Cap brim -->
    <rect x="150" y="178" width="120" height="18" rx="3" fill="white" opacity="0.9"/>

    <!-- Cap top button -->
    <circle cx="210" cy="148" r="5" fill="#a5b4fc"/>

    <!-- Tassel string -->
    <line x1="270" y1="178" x2="270" y2="210" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>

    <!-- Tassel ball -->
    <circle cx="270" cy="216" r="7" fill="#facc15">
      <animate attributeName="r" values="7;9;7" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Tassel fringe -->
    <line x1="264" y1="210" x2="260" y2="224" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
    <line x1="270" y1="212" x2="270" y2="226" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
    <line x1="276" y1="210" x2="280" y2="224" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Pulse ring around cap -->
  <circle cx="210" cy="185" r="55" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0">
    <animate attributeName="r"       values="55;85;55"   dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5"  dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="210" cy="185" r="55" fill="none" stroke="#a5b4fc" stroke-width="1" opacity="0">
    <animate attributeName="r"       values="55;100;55"  dur="3s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3"  dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ClassCore title -->
  <text x="210" y="280" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="38" font-weight="800"
        fill="white" filter="url(#glow-text)" letter-spacing="-1">
    ClassCore
    <animate attributeName="opacity" values="0;1;1" dur="1.2s" fill="freeze"/>
  </text>

  <!-- Animated underline -->
  <rect x="110" y="290" width="0" height="3" rx="2" fill="#6366f1">
    <animate attributeName="width" values="0;200;200" dur="1.5s" begin="0.5s" fill="freeze"
      calcMode="spline" keySplines="0.4 0 0.2 1; 0 0 1 1"/>
    <animate attributeName="x"     values="210;110;110" dur="1.5s" begin="0.5s" fill="freeze"
      calcMode="spline" keySplines="0.4 0 0.2 1; 0 0 1 1"/>
  </rect>

  <!-- Subtitle -->
  <text x="210" y="325" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="15" font-weight="400"
        fill="#94a3b8" letter-spacing="0.5" opacity="0">
    Student Management System
    <animate attributeName="opacity" values="0;0;0.9" dur="2s" fill="freeze"
      keyTimes="0;0.6;1"/>
  </text>

  <!-- Feature list items -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1" dur="2.5s" fill="freeze" keyTimes="0;0.7;1"/>

    <circle cx="130" cy="375" r="3" fill="#6366f1"/>
    <text x="145" y="380" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">Manage student records</text>

    <circle cx="130" cy="405" r="3" fill="#10b981"/>
    <text x="145" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">Live search &amp; filters</text>

    <circle cx="130" cy="435" r="3" fill="#f59e0b"/>
    <text x="145" y="440" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">Department breakdown</text>

    <circle cx="130" cy="465" r="3" fill="#6366f1"/>
    <text x="145" y="470" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">Export to CSV</text>

    <circle cx="130" cy="495" r="3" fill="#a5b4fc"/>
    <text x="145" y="500" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">Dark mode support</text>
  </g>

  <!-- Bottom year badge -->
  <!-- <rect x="130" y="545" width="160" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9" dur="3s" fill="freeze" keyTimes="0;0.8;1"/>
  </rect>
  <text x="210" y="564" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="600" fill="#6366f1"
        letter-spacing="1" opacity="0">
    ACADEMIC YEAR 2025–26
    <animate attributeName="opacity" values="0;0;0.8" dur="3s" fill="freeze" keyTimes="0;0.8;1"/>
  </text> -->
</svg>
